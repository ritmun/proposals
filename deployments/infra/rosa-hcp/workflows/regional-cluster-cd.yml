name: Regional Cluster Deployment

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: true
        type: string
      terraform_action:
        description: 'Terraform action (plan/apply/destroy)'
        required: false
        type: string
        default: 'apply'

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.9.0"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  deploy_regional_cluster:
    name: Regional Cluster - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: terraform/config/regional-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_REGIONAL }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: GitHubActions-RegionalCluster-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=regional-cluster/${{ inputs.environment }}/${{ inputs.aws_region }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_STATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="../../deploy/${{ inputs.environment }}/regional-cluster.tfvars" \
            -var="region=${{ inputs.aws_region }}" \
            -var="environment=${{ inputs.environment }}" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: inputs.terraform_action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        if: inputs.terraform_action == 'apply'
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
          echo "vpc_id=$(terraform output -raw vpc_id)" >> $GITHUB_OUTPUT

      - name: Save Terraform Outputs as Artifacts
        if: inputs.terraform_action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: regional-cluster-outputs-${{ inputs.environment }}
          path: terraform/config/regional-cluster/outputs.json
          retention-days: 30

    outputs:
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      cluster_endpoint: ${{ steps.outputs.outputs.cluster_endpoint }}
