# Cloud Build configuration for GCP HCP Regional Infrastructure deployment
#
# This workflow automates Terraform deployment for regional infrastructure
# Trigger: Git push to main branch (filtered by path)
#
# Setup:
# 1. Create Cloud Build trigger:
#    gcloud builds triggers create github \
#      --repo-name=gcp-hcp-infra \
#      --repo-owner=your-org \
#      --branch-pattern=^main$ \
#      --build-config=gcp-hcp/workflows/cloudbuild-regional.yaml \
#      --included-files=terraform/config/region/**,terraform/modules/region/**
#
# 2. Grant Cloud Build service account permissions:
#    - roles/compute.admin
#    - roles/container.admin
#    - roles/gkehub.admin (for Fleet registration)
#    - roles/dns.admin
#    - roles/workflows.admin

steps:
  # Step 1: Initialize Terraform
  - name: 'hashicorp/terraform:1.5'
    id: 'terraform-init'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION}
        terraform init \
          -backend-config="bucket=${_TERRAFORM_STATE_BUCKET}" \
          -backend-config="prefix=region/${_ENVIRONMENT}/${_SECTOR}/${_REGION}"

  # Step 2: Terraform Plan
  - name: 'hashicorp/terraform:1.5'
    id: 'terraform-plan'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION}
        terraform plan -out=tfplan

  # Step 3: Terraform Apply
  - name: 'hashicorp/terraform:1.5'
    id: 'terraform-apply'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION}
        terraform apply -auto-approve tfplan

  # Step 4: Wait for Fleet Config Sync to bootstrap ArgoCD
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'wait-for-fleet-sync'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Waiting for Fleet Config Sync to bootstrap ArgoCD..."

        # Get cluster credentials
        CLUSTER_NAME=$(cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION} && terraform output -raw cluster_name)
        PROJECT_ID=$(cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION} && terraform output -raw project_id)

        gcloud container clusters get-credentials $${CLUSTER_NAME} \
          --region=${_REGION} \
          --project=$${PROJECT_ID}

        # Wait for config-sync to be healthy
        for i in {1..30}; do
          STATUS=$(gcloud beta container fleet config-management status --format="value(state)" 2>/dev/null || echo "PENDING")
          if [ "$${STATUS}" = "SYNCED" ]; then
            echo "Fleet Config Sync is healthy"
            break
          fi
          echo "Waiting for Fleet Config Sync... (attempt $i/30)"
          sleep 30
        done

  # Step 5: Verify ArgoCD is deployed
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'verify-argocd'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Verifying ArgoCD deployment..."
        kubectl wait --for=condition=available --timeout=300s \
          deployment/argocd-server -n argocd || true

        echo "ArgoCD pods:"
        kubectl get pods -n argocd

  # Step 6: Save Terraform Outputs
  - name: 'hashicorp/terraform:1.5'
    id: 'terraform-output'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/config/region/${_ENVIRONMENT}/${_SECTOR}/${_REGION}
        terraform output -json > /workspace/outputs/regional-outputs.json

# Substitution variables
substitutions:
  _ENVIRONMENT: 'integration'
  _SECTOR: 'main'
  _REGION: 'us-central1'
  _TERRAFORM_STATE_BUCKET: 'gcp-hcp-terraform-state'

# Store outputs as artifacts
artifacts:
  objects:
    location: 'gs://${_TERRAFORM_STATE_BUCKET}/outputs/${BUILD_ID}'
    paths:
      - '/workspace/outputs/*.json'

# Build timeout (longer for cluster creation + Fleet sync)
timeout: '2400s'

# Service account
serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/cloud-build@${PROJECT_ID}.iam.gserviceaccount.com'

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'
